<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InCheck 360 Logo</title>
</head>
<body style="margin:0; background:#efefef; display:flex; justify-content:center; align-items:center; height:100vh;">
  <svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="500" fill="#efefef"/>

    <rect x="70" y="120" width="8" height="280" fill="#1E3FE6"/>
    <rect x="140" y="120" width="8" height="280" fill="#1E3FE6"/>

    <text x="220" y="310"
          font-family="Arial, Helvetica, sans-serif"
          font-size="220"
          font-weight="700"
          fill="#1E3FE6"
          letter-spacing="-8">
      InCheck
    </text>

    <text x="220" y="380"
          font-family="Arial, Helvetica, sans-serif"
          font-size="58"
          font-weight="700"
          fill="#1E3FE6"
          letter-spacing="18">
      360
    </text>
  </svg>
</body>
</html>
